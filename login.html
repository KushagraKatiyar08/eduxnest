<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Login to eduXnest</title>
</head>
<body>

<div class="container">
    <div class="box">

        <!----------------- LOGIN BOX ----------------------->
        <div class="box-login" id="Login">

            <div class="top-header">
                <h3>Hello , Again</h3>
                <small>We are happy to have you back</small>
            </div>

            <div class="input-group">
                <div class="input-field">
                    <input type="text" class="input-box" id="logEmail" required>
                    <label for="logEmail">Email address</label>
                </div>

                <div class="input-field">
                    <input type="password" class="input-box" id="logPassword" required>
                    <label for="logPassword">Password</label>
                    <div class="eye-area">
                        <div class="eye-box" onclick="myLogPassword()">
                            <i class="fa-regular fa-eye" id="eye"></i>
                            <i class="fa-regular fa-eye-slash" id="eye-slash"></i>    
                        </div>
                    </div>
                </div>
            </div>

            <div class="remember">
                <input type="checkbox" id="formCheck" class="check">
                <label for="formCheck"> Remember Me</label>  
            </div>

            <div class="input-field">
                <input type="submit" class="input-submit" value="Sign In">
            </div>

            <div class="forgot">
                <a href="#">Forgot password?</a>
            </div>   
        </div>


        <!---------------- REGISTER BOX -------------------->

        <div class="box-register" id="register">

            <div class="top-header">
                <h3>Sign Up, Now</h3>
                <small>We are happy to have you with us</small>
            </div> 

            <div class="input-group">
                <div class="input-field">
                    <input type="text" class="input-box" id="regUser" required>
                    <label for="regUser">Username</label>
                </div>

                <div class="input-field">
                    <input type="text" class="input-box" id="regEmail" required>
                    <label for="regEmail">Email address</label>
                </div>

                <div class="input-field">
                    <input type="password" class="input-box" id="regPassword" required>
                    <label for="regPassword">Password</label>
                    <div class="eye-area">
                        <div class="eye-box" onclick="myRegPassword()">
                            <i class="fa-regular fa-eye" id="eye-2"></i>
                            <i class="fa-regular fa-eye-slash" id="eye-slash-2"></i>    
                        </div>
                    </div>
                </div>
            </div>

            <div class="remember">
                <input type="checkbox" id="formCheck-2" class="check">
                <label for="formCheck-2"> Remember Me</label>  
            </div> 

            <div class="input-field">
                <input type="submit" class="input-submit" value="Sign Up">
            </div>

        </div>

    </div>

    <!------------------ SWITCH ------------------------->

    <div class="switch">
        <a href="#" class="Login" onclick="login()">Login</a>
        <a href="#" class="register" onclick="register()">Register</a>
        <div class="btn-active" id="btn"></div>
    </div>

</div>

<script>

    var x = document.getElementById('Login');
    var y = document.getElementById('register');
    var z = document.getElementById('btn');

    function login(){
        x.style.left = "0px";
        y.style.right = "-350px";
        z.style.left = "0px";
    }

    function register(){
        x.style.left = "-350px";
        y.style.right = "0px";
        z.style.left = "150px";
    }

    // ===== PASSWORD TOGGLE (LOGIN) =====
    function myLogPassword(){
        var pass = document.getElementById('logPassword');
        var eye = document.getElementById('eye');
        var slash = document.getElementById('eye-slash');

        if(pass.type === "password"){
            pass.type = "text";
            eye.style.opacity = "0";
            slash.style.opacity = "1";
        } else {
            pass.type = "password";
            eye.style.opacity = "1";
            slash.style.opacity = "0";
        }
    }

    // ===== PASSWORD TOGGLE (REGISTER) =====
    function myRegPassword(){
        var pass = document.getElementById('regPassword');
        var eye = document.getElementById('eye-2');
        var slash = document.getElementById('eye-slash-2');

        if(pass.type === "password"){
            pass.type = "text";
            eye.style.opacity = "0";
            slash.style.opacity = "1";
        } else {
            pass.type = "password";
            eye.style.opacity = "1";
            slash.style.opacity = "0";
        }
    }

</script>

</body>
</html>
